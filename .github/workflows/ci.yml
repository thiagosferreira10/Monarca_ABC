name: CI — Testes + Build de Produção

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:    # permite rodar manualmente pelo GitHub

jobs:
  # ============================================================
  # JOB 1: Testes automatizados
  # ============================================================
  testes:
    name: 🧪 Pytest
    runs-on: windows-latest   # mesmo SO do cliente!

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: 🧪 Rodar testes
        run: python -m pytest --tb=short -v

  # ============================================================
  # JOB 2: Build de produção (só roda se testes passarem)
  # ============================================================
  build:
    name: 🏗️ Build de Produção
    runs-on: windows-latest
    needs: testes           # ← depende do job de testes
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: 📦 Instalar dependências + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Compilar Ferramentas.exe
        run: pyinstaller MonarcaABC.spec --noconfirm

      - name: 🏗️ Gerar pasta de produção
        run: python build_producao.py

      - name: 📦 Upload do artefato de produção
        uses: actions/upload-artifact@v4
        with:
          name: producao-${{ github.run_number }}
          path: producao/
          retention-days: 30

      - name: ✅ Resumo do build
        run: |
          echo "Build gerado com sucesso!"
          echo "Run number: ${{ github.run_number }}"
          Get-ChildItem producao/ -Recurse | Measure-Object -Property Length -Sum |
            ForEach-Object { echo "Total: $([math]::Round($_.Sum/1MB, 1)) MB" }
